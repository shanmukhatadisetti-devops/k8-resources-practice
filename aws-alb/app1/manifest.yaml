apiVersion: apps/v1
kind: Deployment
metadata:
    name: app1
    namespace: roboshop
    labels:
        project: roboshop
        component: app1
        env: dev
spec:
    replicas: 2
    selector:
        matchLabels:
            project: roboshop
            component: app1
            env: dev
    template:
        metadata:
            labels:
                project: roboshop
                component: app1
                env: dev
        spec:
            containers:
            - name: app1
              image: app1:v1
              imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
    name: app1
    namespace: roboshop
    labels:
        project: roboshop
        component: app1
        env: dev
spec:
    selector:
        project: roboshop
        component: app1
        env: dev
    ports:
    - protocol: TCP
      port: 80
      targetPort: 
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  namespace: roboshop
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:430774481266:certificate/571486b5-6ef1-4d0e-8b86-b637a15f6faf
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: roboshop
spec:
  ingressClassName: alb
  rules:
  - host: "app1.autonagar.in"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80