apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    project: roboshop
    component: mongodb
    env: dev
spec:
  selector:
    project: roboshop
    component: mongodb
    env: dev
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  labels:
    project: roboshop
    component: mongodb
    env: dev
spec:
  selector:
    project: roboshop
    component: mongodb
    env: dev
  clusterIP: None
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    project: roboshop
    component: mongodb
    env: dev
spec:
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      env: dev
  serviceName: "mongodb-headless"
  replicas: 2 
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        env: dev
    spec:
      containers:
      - name: mongodb
        image: shanmukhatadisetti/mongodb:v1
        ports:
        - containerPort: 27017
          name: mongodb
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: mongodb-pvc
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb-pvc
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi